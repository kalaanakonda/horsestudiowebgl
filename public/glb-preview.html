<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLB + Dither Preview</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      :root {
        --bg: #f6f7fb;
        --ink: #0f172a;
        --card: #ffffff;
        --border: #d1d5db;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, #e0ecff, var(--bg) 55%);
        color: var(--ink);
      }
      .wrap {
        max-width: 1320px;
        margin: 20px auto;
        padding: 0 16px;
        display: grid;
        grid-template-columns: 1.2fr 1.2fr 0.8fr;
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
      }
      .head {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
      }
      .panel {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: grid;
        gap: 8px;
        background: #fafafa;
      }
      .row {
        display: grid;
        grid-template-columns: 120px 1fr 50px;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }
      model-viewer,
      #ditherCanvas {
        width: 100%;
        height: 72vh;
        display: block;
        background: #f8fafc;
      }
      pre {
        margin: 0;
        padding: 12px;
        max-height: 82vh;
        overflow: auto;
        font-size: 12px;
        line-height: 1.4;
      }
      #status {
        margin: 0;
        padding: 8px 12px;
        font-size: 12px;
        border-top: 1px solid var(--border);
        background: #fafafa;
      }
      @media (max-width: 1100px) {
        .wrap {
          grid-template-columns: 1fr;
        }
        model-viewer,
        #ditherCanvas,
        pre {
          height: 48vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <div class="head">3D GLB</div>
        <model-viewer
          id="mv"
          src="/lock_and_key_compressed_2.glb"
          camera-controls
          auto-rotate
          shadow-intensity="1"
          exposure="1"
          ar
          alt="Lock and key GLB"
        ></model-viewer>
      </section>

      <section class="card">
        <div class="head">Dither Effect Preview</div>
        <div class="panel">
          <div class="row">
            <label for="threshold">Threshold</label>
            <input id="threshold" type="range" min="0" max="255" value="145" />
            <span id="thresholdVal">145</span>
          </div>
          <div class="row">
            <label for="sampleStep">Sample Step</label>
            <input id="sampleStep" type="range" min="1" max="8" value="2" />
            <span id="sampleStepVal">2</span>
          </div>
          <div class="row">
            <label for="dotSize">Dot Size</label>
            <input id="dotSize" type="range" min="1" max="6" value="2" />
            <span id="dotSizeVal">2</span>
          </div>
        </div>
        <canvas id="ditherCanvas" width="900" height="620"></canvas>
        <p id="status">Waiting for GLB frame...</p>
      </section>

      <section class="card">
        <div class="head">lock.json</div>
        <pre id="json">Loading...</pre>
      </section>
    </div>

    <script>
      const mv = document.getElementById('mv')
      const canvas = document.getElementById('ditherCanvas')
      const ctx = canvas.getContext('2d')
      const off = document.createElement('canvas')
      const offCtx = off.getContext('2d')
      const statusEl = document.getElementById('status')

      const threshold = document.getElementById('threshold')
      const sampleStep = document.getElementById('sampleStep')
      const dotSize = document.getElementById('dotSize')
      const thresholdVal = document.getElementById('thresholdVal')
      const sampleStepVal = document.getElementById('sampleStepVal')
      const dotSizeVal = document.getElementById('dotSizeVal')

      const updateLabels = () => {
        thresholdVal.textContent = threshold.value
        sampleStepVal.textContent = sampleStep.value
        dotSizeVal.textContent = dotSize.value
      }

      ;[threshold, sampleStep, dotSize].forEach((el) => el.addEventListener('input', updateLabels))
      updateLabels()

      fetch('/lock.json')
        .then((r) => r.json())
        .then((data) => {
          document.getElementById('json').textContent = JSON.stringify(data, null, 2)
        })
        .catch((err) => {
          document.getElementById('json').textContent = `Could not load lock.json: ${err}`
        })

      function getModelCanvas() {
        const root = mv.shadowRoot
        if (!root) return null
        return root.querySelector('canvas')
      }

      function drawDitherFrom(sourceCanvas) {
        const w = sourceCanvas.width
        const h = sourceCanvas.height
        if (!w || !h) return

        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w
          canvas.height = h
        }

        off.width = w
        off.height = h
        offCtx.drawImage(sourceCanvas, 0, 0)
        const img = offCtx.getImageData(0, 0, w, h)
        const px = img.data

        ctx.fillStyle = '#ffffff'
        ctx.fillRect(0, 0, w, h)
        ctx.fillStyle = '#101010'

        const step = Number(sampleStep.value)
        const r = Number(dotSize.value)
        const th = Number(threshold.value)

        for (let y = 0; y < h; y += step) {
          for (let x = 0; x < w; x += step) {
            const i = (y * w + x) * 4
            const lum = 0.2126 * px[i] + 0.7152 * px[i + 1] + 0.0722 * px[i + 2]
            if (lum < th) {
              ctx.beginPath()
              ctx.arc(x, y, r * 0.5, 0, Math.PI * 2)
              ctx.fill()
            }
          }
        }
      }

      function loop() {
        const glCanvas = getModelCanvas()
        if (glCanvas) {
          try {
            drawDitherFrom(glCanvas)
            statusEl.textContent = 'Live dither running from model render.'
          } catch (err) {
            statusEl.textContent = `Dither render issue: ${err}`
          }
        } else {
          statusEl.textContent = 'Waiting for model-viewer internal canvas...'
        }
        requestAnimationFrame(loop)
      }

      mv.addEventListener('load', () => {
        statusEl.textContent = 'Model loaded. Starting dither loop...'
      })

      loop()
    </script>
  </body>
</html>
